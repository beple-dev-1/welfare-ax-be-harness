workspaceName: we-adk-welfare
outputDir: target
planSkill: dev-plan
tempDir: target/tmp
basePackagePattern: com.beplepay.weadk.welfare
commonUtilsArtifact: "we-adk-welfare-common"
tracing:
  mdcKey: traceId

db:
  vendor: postgresql

projects:
  - name: we-adk-welfare-user
    shortName: user
    description: 사용자 API (경조사 신청·승인·지급·정산)
    dir: we-adk-welfare-user
    buildTool: gradle
    guideline: guide-springboot-web
    conditionalGuides:
      - condition: jpa
        guide: guide-jpa
      - condition: thymeleaf
        guide: guide-frontend
    outputDir: target

  - name: we-adk-welfare-admin
    shortName: admin
    description: 관리자 API (skeleton)
    dir: we-adk-welfare-admin
    buildTool: gradle
    guideline: guide-springboot-web
    outputDir: target

  - name: we-adk-welfare-batch
    shortName: batch
    description: 배치 처리 (skeleton)
    dir: we-adk-welfare-batch
    buildTool: gradle
    outputDir: target

  - name: we-adk-welfare-domain
    shortName: domain
    description: 공통 도메인 (Entity, Repository)
    dir: we-adk-welfare-domain
    buildTool: gradle
    conditionalGuides:
      - condition: jpa
        guide: guide-jpa
    outputDir: target

  - name: we-adk-welfare-common
    shortName: common
    description: 공통 인프라 (예외, 응답 래퍼, HTTP 클라이언트, 분산 추적, 유틸)
    dir: we-adk-welfare-common
    buildTool: gradle
    outputDir: target
