# 작업 스코프 정의
# /develop {스코프} 호출 시 AI의 수정 가능 경로를 제한한다.
#
# 분리 원칙:
#   ceremony/* — 경조사 전용 (welfare-ax-user + welfare-ax-domain)
#   member/*, merchant/* — 공통 도메인 (welfare-ax-domain)
#   common/* — 공통 인프라 (welfare-ax-common)
#   admin/* — 관리자 영역 (welfare-ax-admin)
#   batch/* — 배치 영역 (welfare-ax-batch)

features:
  scope:
    enabled: true

# 스코프에 관계없이 모든 작업에서 접근 가능한 전역 경로
# target/은 git 추적 대상이며 feature 브랜치에서 생성 후 PR 머지로 main에 반영된다.
globalAllowedPaths:
  - target/works/**          # 개발 브리프 (/dev-interview 생성)
  - target/plans/**          # 개발·테스트 계획서 (/dev-plan 생성)
  - target/test-reports/**   # 테스트 결과서 (/qa-test 생성)

scopes:
  - id: ceremony
    description: 경조사지원 전용 (신청·승인·지급·정산)
    allowedPaths:
      - welfare-ax-user/src/main/java/com/beplepay/welfareaxbe/user/ceremony/**
      - welfare-ax-user/src/test/java/com/beplepay/welfareaxbe/user/ceremony/**
      - welfare-ax-domain/src/main/java/com/beplepay/welfareaxbe/domain/ceremony/**
      - welfare-ax-domain/src/test/java/com/beplepay/welfareaxbe/domain/ceremony/**
    sharedModules:
      - welfare-ax-common/src/main/java/**
      - welfare-ax-domain/src/main/java/com/beplepay/welfareaxbe/domain/member/**
      - welfare-ax-domain/src/main/java/com/beplepay/welfareaxbe/domain/merchant/**

  - id: member
    description: 회원 관리 — 복지 공통 도메인
    allowedPaths:
      - welfare-ax-domain/src/main/java/com/beplepay/welfareaxbe/domain/member/**
      - welfare-ax-domain/src/test/java/com/beplepay/welfareaxbe/domain/member/**
    sharedModules:
      - welfare-ax-common/src/main/java/**

  - id: merchant
    description: 가맹점 관리 — 복지 공통 도메인
    allowedPaths:
      - welfare-ax-domain/src/main/java/com/beplepay/welfareaxbe/domain/merchant/**
      - welfare-ax-domain/src/test/java/com/beplepay/welfareaxbe/domain/merchant/**
    sharedModules:
      - welfare-ax-common/src/main/java/**

  - id: common
    description: 공통 인프라 (예외, 응답 래퍼, 유틸, 보안, HTTP 클라이언트, 분산 추적, 설정)
    allowedPaths:
      - welfare-ax-common/src/main/java/**
      - welfare-ax-common/src/test/java/**
      - welfare-ax-user/src/main/java/com/beplepay/welfareaxbe/user/config/**
      - welfare-ax-user/src/main/java/com/beplepay/welfareaxbe/user/security/**
      - welfare-ax-user/src/main/java/com/beplepay/welfareaxbe/user/client/**
      - welfare-ax-user/src/test/java/com/beplepay/welfareaxbe/user/config/**
      - welfare-ax-user/src/test/java/com/beplepay/welfareaxbe/user/security/**
      - welfare-ax-user/src/test/java/com/beplepay/welfareaxbe/user/client/**
      - welfare-ax-user/src/main/resources/application.yaml
      - welfare-ax-user/src/main/resources/application-local.yaml
      - welfare-ax-user/src/main/resources/application-dev.yaml
      - welfare-ax-user/src/main/resources/application-api.yaml
      - welfare-ax-user/src/main/resources/logback-spring.xml
    sharedModules: []

  - id: admin
    description: 관리자 API (welfare-ax-admin)
    allowedPaths:
      - welfare-ax-admin/src/main/java/**
      - welfare-ax-admin/src/test/java/**
      - welfare-ax-admin/src/main/resources/application.yaml
      - welfare-ax-admin/src/main/resources/application-local.yaml
    sharedModules:
      - welfare-ax-domain/src/main/java/**
      - welfare-ax-common/src/main/java/**

  - id: batch
    description: 배치 처리 (welfare-ax-batch)
    allowedPaths:
      - welfare-ax-batch/src/main/java/**
      - welfare-ax-batch/src/test/java/**
      - welfare-ax-batch/src/main/resources/application.yaml
      - welfare-ax-batch/src/main/resources/application-local.yaml
    sharedModules:
      - welfare-ax-domain/src/main/java/**
      - welfare-ax-common/src/main/java/**
