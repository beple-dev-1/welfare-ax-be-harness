# 작업 스코프 정의
# /develop {스코프} 호출 시 AI의 수정 가능 경로를 제한한다.
#
# 분리 원칙:
#   ceremony/* — 경조사 전용 (we-adk-welfare-user + we-adk-welfare-domain)
#   member/*, merchant/* — 공통 도메인 (we-adk-welfare-domain)
#   common/* — 공통 인프라 (we-adk-welfare-common)
#   admin/* — 관리자 영역 (we-adk-welfare-admin)
#   batch/* — 배치 영역 (we-adk-welfare-batch)

features:
  scope:
    enabled: true

# 스코프에 관계없이 모든 작업에서 접근 가능한 전역 경로
# target/은 git으로 추적하지 않으며 로컬 전용 산출물로 관리된다. (.gitignore 제외 대상)
globalAllowedPaths:
  - target/works/**          # 개발 브리프 (/dev-interview 생성)
  - target/plans/**          # 개발·테스트 계획서 (/dev-plan 생성)
  - target/test-reports/**   # 테스트 결과서 (/qa-test 생성)

scopes:
  - id: ceremony
    description: 경조사지원 전용 (신청·승인·지급·정산)
    allowedPaths:
      - we-adk-welfare-user/src/main/java/com/beplepay/weadk/welfare/user/ceremony/**
      - we-adk-welfare-user/src/test/java/com/beplepay/weadk/welfare/user/ceremony/**
      - we-adk-welfare-user/src/main/resources/templates/ceremony/**
      - we-adk-welfare-user/src/main/resources/static/js/ceremony/**
      - we-adk-welfare-user/src/main/resources/static/css/ceremony/**
      - we-adk-welfare-domain/src/main/java/com/beplepay/weadk/welfare/domain/ceremony/**
      - we-adk-welfare-domain/src/test/java/com/beplepay/weadk/welfare/domain/ceremony/**
    sharedModules:
      - we-adk-welfare-common/src/main/java/**
      - we-adk-welfare-domain/src/main/java/com/beplepay/weadk/welfare/domain/member/**
      - we-adk-welfare-domain/src/main/java/com/beplepay/weadk/welfare/domain/merchant/**

  - id: member
    description: 회원 관리 — 복지 공통 도메인
    allowedPaths:
      - we-adk-welfare-domain/src/main/java/com/beplepay/weadk/welfare/domain/member/**
      - we-adk-welfare-domain/src/test/java/com/beplepay/weadk/welfare/domain/member/**
    sharedModules:
      - we-adk-welfare-common/src/main/java/**

  - id: merchant
    description: 가맹점 관리 — 복지 공통 도메인
    allowedPaths:
      - we-adk-welfare-domain/src/main/java/com/beplepay/weadk/welfare/domain/merchant/**
      - we-adk-welfare-domain/src/test/java/com/beplepay/weadk/welfare/domain/merchant/**
    sharedModules:
      - we-adk-welfare-common/src/main/java/**

  - id: common
    description: 공통 인프라 (예외, 응답 래퍼, 유틸, 보안, HTTP 클라이언트, 분산 추적, 설정)
    allowedPaths:
      - we-adk-welfare-common/src/main/java/**
      - we-adk-welfare-common/src/test/java/**
      - we-adk-welfare-user/src/main/java/com/beplepay/weadk/welfare/user/config/**
      - we-adk-welfare-user/src/main/java/com/beplepay/weadk/welfare/user/security/**
      - we-adk-welfare-user/src/main/java/com/beplepay/weadk/welfare/user/client/**
      - we-adk-welfare-user/src/test/java/com/beplepay/weadk/welfare/user/config/**
      - we-adk-welfare-user/src/test/java/com/beplepay/weadk/welfare/user/security/**
      - we-adk-welfare-user/src/test/java/com/beplepay/weadk/welfare/user/client/**
      - we-adk-welfare-user/src/main/resources/application.yaml
      - we-adk-welfare-user/src/main/resources/application-local.yaml
      - we-adk-welfare-user/src/main/resources/application-dev.yaml
      - we-adk-welfare-user/src/main/resources/application-api.yaml
      - we-adk-welfare-user/src/main/resources/logback-spring.xml
    sharedModules: []

  - id: admin
    description: 관리자 API (we-adk-welfare-admin)
    allowedPaths:
      - we-adk-welfare-admin/src/main/java/**
      - we-adk-welfare-admin/src/test/java/**
      - we-adk-welfare-admin/src/main/resources/application.yaml
      - we-adk-welfare-admin/src/main/resources/application-local.yaml
    sharedModules:
      - we-adk-welfare-domain/src/main/java/**
      - we-adk-welfare-common/src/main/java/**

  - id: batch
    description: 배치 처리 (we-adk-welfare-batch)
    allowedPaths:
      - we-adk-welfare-batch/src/main/java/**
      - we-adk-welfare-batch/src/test/java/**
      - we-adk-welfare-batch/src/main/resources/application.yaml
      - we-adk-welfare-batch/src/main/resources/application-local.yaml
    sharedModules:
      - we-adk-welfare-domain/src/main/java/**
      - we-adk-welfare-common/src/main/java/**
