systemName: 복지AX-BE
basePackage: com.beplepay.welfareaxbe

db:
  vendor: postgresql
  schemaPrefix: ""

review:
  defaultLanguage: ko
  maxFiles: 50
  maxLines: 5000

git:
  protectedBranches:
    - main
    - develop
    - release-*
    - internal-*

# 버전관리 — 현재 GitHub 사용, 추후 GitLab으로 전환 예정
vcs:
  current: github
  github:
    baseUrl: https://github.com
  gitlab:
    baseUrl: ""           # GitLab 전환 시 설정
    projectMappings: {}

# 하네스 레포 — .claude/, CLAUDE.md 를 별도 레포에서 관리
# GitLab 전환 시 current를 gitlab으로 변경하고 gitlab 항목의 값을 채운다
# 브랜치 전략: 소스 레포와 동일하게 feature 브랜치 → PR → main 머지
harness:
  current: github
  localPath: ../welfare-ax-be-harness
  branchStrategy: feature-pr   # main 직접 커밋 금지, feature/{설명}/gkwns458 브랜치 사용
  github:
    remote: https://github.com/beple-dev-1/welfare-ax-be-harness.git
  gitlab:
    remote: ""            # GitLab 전환 시 설정

notification:
  enabled: false
  type: ""

# 환경 구성 (local → dev → prod)
environments:
  local:
    description: 로컬 개발 (GitHub + 로컬 DB)
    vcs: github
  dev:
    description: 개발 서버 (GitLab + 실제 개발 DB) — 추후 구성
    vcs: gitlab
  prod:
    description: 운영 (GitLab + 운영 DB) — 추후 구성
    vcs: gitlab

features:
  scope:
    enabled: true
  mrComment:
    enabled: false    # GitLab 전환 후 true로 변경
  flowNotification:
    enabled: false
